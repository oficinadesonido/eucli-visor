<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>eucliMiniV2 — visor caja 3D</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#2b2d33;font-family:system-ui,sans-serif;color:#eee}
  #ui{position:fixed;top:10px;left:10px;background:rgba(20,22,26,.82);padding:12px 14px;border-radius:8px;font-size:13px;z-index:10;line-height:1.9}
  #ui h3{margin:0 0 6px;font-size:13px;color:#8fd}
  #ui label{display:block;cursor:pointer;user-select:none}
  #ui input{vertical-align:-2px;margin-right:6px}
  #hint{position:fixed;bottom:8px;left:10px;font-size:11px;color:#9aa;z-index:10}
  #err{position:fixed;top:10px;right:10px;color:#fa8;font-size:12px;max-width:42ch;z-index:10;text-align:right}
  #views{position:fixed;top:10px;right:10px;background:rgba(20,22,26,.82);padding:10px 12px;border-radius:8px;z-index:10}
  #views h3{margin:0 0 6px;font-size:13px;color:#8fd}
  #views button{display:inline-block;margin:2px;padding:5px 9px;font-size:12px;background:#3a3d44;color:#eee;border:1px solid #555;border-radius:5px;cursor:pointer}
  #views button:hover{background:#4a4e57}
</style>
</head>
<body>
<div id="ui">
  <h3>Capas</h3>
  <label><input type="checkbox" id="c_pcb" checked> PCB</label>
  <label><input type="checkbox" id="c_comps" checked> Componentes</label>
  <label><input type="checkbox" id="c_knobs" checked> Perillas</label>
  <label><input type="checkbox" id="c_screws" checked> Tornillos (M3 allen)</label>
  <label><input type="checkbox" id="c_panel" checked> Panel frontal</label>
  <label><input type="checkbox" id="c_case" checked> Caja (paredes+base)</label>
  <hr style="border-color:#444">
  <label><input type="checkbox" id="c_trans"> Caja translúcida</label>
  <label><input type="checkbox" id="c_edges" checked> Bordes (tabs/slots)</label>
  <div style="margin-top:6px">Color caja (soldermask JLC):</div>
  <div id="sm"></div>
  <div style="margin-top:6px">Acabado cobre: <button id="cu_gold">Oro</button> <button id="cu_silver">Plata</button></div>
  <div style="margin-top:6px">Tipo de perilla (potes): <select id="knobtype"></select></div>
  <div style="margin-top:4px">Color por pote:</div>
  <div id="potecols"></div>
</div>
<div id="views">
  <h3>Vista</h3>
  <button data-v="iso">Iso</button><button data-v="top">Superior</button><button data-v="bottom">Inferior</button><br>
  <button data-v="front">Frente</button><button data-v="back">Atrás</button><br>
  <button data-v="left">Izquierda</button><button data-v="right">Derecha</button>
</div>
<div id="hint">arrastrar = rotar · rueda = zoom · click derecho = pan</div>
<div id="err"></div>
<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const errEl=document.getElementById('err');
const showErr=m=>{errEl.textContent=String(m);console.error(m);};

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x2b2d33);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// centro de la placa (frame: X=worldX, Y=alto, Z=worldY)
const CX=66.13, CZ=135.86;
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,1,8000);
camera.position.set(CX-140,150,CZ-180);
const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(CX,2,CZ);
controls.update();

renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
scene.add(new THREE.AmbientLight(0xffffff,0.32));
const add=(x,y,z,i)=>{const d=new THREE.DirectionalLight(0xffffff,i);d.position.set(x,y,z);scene.add(d);};
add(-120,220,-80,1.5); add(150,140,120,0.8); add(0,-140,40,0.4);

const G={pcb:new THREE.Group(),comps:new THREE.Group(),knobs:new THREE.Group(),screws:new THREE.Group(),panel:new THREE.Group(),case:new THREE.Group()};
Object.values(G).forEach(g=>scene.add(g));

const loader=new GLTFLoader();
const VER='?v=15';   // cache-bust: subir al re-deployar para forzar recarga de los .glb
const caseMats=[];
function load(file,group,scale,onMesh){
  loader.load(file+VER,g=>{
    g.scene.scale.setScalar(scale);
    if(onMesh) g.scene.traverse(o=>{if(o.isMesh)onMesh(o);});
    group.add(g.scene);
  },undefined,e=>showErr('No cargó '+file+' — abrí por servidor (http), no file://. '+e));
}
// PCB y componentes: GLB en metros -> x1000 a mm.  Caja: GLB ya en mm -> x1.
load('pcb.glb',G.pcb,1000);
// componentes: kicad-cli los exporta gris claro -> oscurecer (botones/IC/potes negros, look solido)
load('comps.glb',G.comps,1000,o=>{if(o.material){o.material=o.material.clone();o.material.color.setRGB(0.11,0.11,0.12);o.material.roughness=0.55;o.material.metalness=0.2;}});
// Panel frontal real (FR4 con graficos). Su GLB esta en coords del proyecto panel ->
// offset para alinear al board por M3, + altura del standoff. F mira hacia afuera (+alto).
const GOLD=new THREE.Color('#d4a017'), SILVER=new THREE.Color('#cacace');
const FR4=new THREE.Color(0.80,0.70,0.42);   // FR4 desnudo (igual que el canto de la caja)
const panelSmMats=[], panelCuMats=[];
load('panel.glb',G.panel,1000,o=>{
  if(!o.material) return;
  const m=o.material=o.material.clone(), c=m.color;
  m.transparent=false; m.opacity=1; m.depthWrite=true;        // KiCad exporta semitransparente -> opaco
  if(m.metalness>0.5){ m.roughness=0.4; m.metalness=1; m.color.copy(GOLD); panelCuMats.push(m); }                  // cobre/metal -> oro (toggle oro/plata)
  else if(c.r<0.3 && c.g>c.r && c.g>=c.b){ m.color.setRGB(0.10,0.35,0.20); m.roughness=0.6; m.metalness=0; panelSmMats.push(m); }  // soldermask = verde OSCURO (recolorable como la caja)
  else if(c.r>0.85 && c.g>0.85 && c.b>0.85){ /* silkscreen blanco: dejar */ }                                     // silk
  else { m.color.copy(FR4); m.roughness=0.75; m.metalness=0; }   // sustrato FR4 (oliva) incl. CANTOS -> tan solido
});
G.panel.position.set(-7.06, 11.5, 34.19);
// ===== Perillas: encoder fijo + 3 potes instanciados del tipo elegido, color por pote =====
const POTS=[[87.40,120.70],[44.85,120.75],[66.00,127.60]];  // (worldX, worldY) de los 3 potes
const ENC=[65.8,90.2];                                       // encoder (centro del anillo)
const KBZ=15;                                                // altura base de las perillas (mm)
const KNOB_TYPES={'WH148 AG3':'knob_wh148.glb','Davies 1900h':'knob_davies.glb','Chroma':'knob_chroma.glb',
                  'MXR 25mm':'knob_mxr.glb','Negra c/aleta':'knob_knobv3.glb','Pote (tope)':'knob_pot10.glb'};
// paleta ACOTADA de colores para los potes (no selector libre)
const KNOBPAL=[['Negro','#1a1a1a'],['Rojo','#c01818'],['Naranja','#d95a0d'],['Amarillo','#e0c000'],
  ['Verde','#1a9e2e'],['Azul','#1746b0'],['Celeste','#3aa0e0'],['Violeta','#7a3aa0'],['Gris','#9a9a9a'],['Blanco','#e8e8e8']];
const potColors=['#d95a0d','#c01818','#1a9e2e'];
const knobLoader=new GLTFLoader(), tplCache={};
let potInst=[null,null,null];
function loadTpl(file){return new Promise((res,rej)=>{
  if(tplCache[file])return res(tplCache[file]);
  knobLoader.load(file+VER,g=>{tplCache[file]=g.scene;res(g.scene);},undefined,rej);});}
function applyPotColor(inst,hex){const c=new THREE.Color(hex);
  inst.traverse(o=>{if(o.isMesh&&o.userData.kc){o.material.color.copy(c);o.material.needsUpdate=true;}});}
function setKnobType(file){
  potInst.forEach(o=>{if(o)G.knobs.remove(o);});
  loadTpl(file).then(tpl=>{POTS.forEach((p,i)=>{
    const inst=tpl.clone(true);
    inst.position.set(p[0],KBZ,p[1]);
    inst.traverse(o=>{if(o.isMesh&&o.material){o.material=o.material.clone();
      if(/knobcolor/i.test(o.material.name))o.userData.kc=true;}});
    applyPotColor(inst,potColors[i]); G.knobs.add(inst); potInst[i]=inst;
  });}).catch(e=>showErr('perilla '+file+': '+e));
}
loadTpl('knob_encoder.glb').then(tpl=>{const e=tpl.clone(true);e.position.set(ENC[0],KBZ,ENC[1]);G.knobs.add(e);})
  .catch(e=>showErr('encoder: '+e));
// tornillos M3 cabeza allen negra (ya en mm/world, negro mate metalico — sin recolor)
load('screws.glb',G.screws,1);

// colores soldermask JLC -> color de la CAJA (se fabrica en FR4/PCB en JLC)
const JLC=[['Verde','#157f3b'],['Rojo','#9e2018'],['Amarillo','#c7b200'],['Azul','#1f3d7a'],
           ['Blanco','#dcdcdc'],['Negro','#141414'],['Morado','#4b1d6e']];
const smDiv=document.getElementById('sm');
JLC.forEach(([name,hex])=>{
  const b=document.createElement('button');
  b.title=name; b.style.cssText=`width:20px;height:20px;margin:2px;padding:0;border:1px solid #888;border-radius:4px;background:${hex};cursor:pointer`;
  b.onclick=()=>{const c=new THREE.Color(hex);
    caseMats.forEach(m=>{m.color.copy(c);m.needsUpdate=true;});
    panelSmMats.forEach(m=>{m.color.copy(c);m.needsUpdate=true;});};
  smDiv.appendChild(b);
});
const caseEdges=[], caseFr4Mats=[];
load('case.glb',G.case,1,o=>{
  o.material=o.material.clone();
  o.material.transparent=false; o.material.opacity=1; o.material.depthWrite=true;   // solido por defecto
  o.material.side=THREE.DoubleSide;
  const c=o.material.color;
  if(c.g>c.r && c.g>=c.b) caseMats.push(o.material);   // cara soldermask (recolorable con JLC)
  else caseFr4Mats.push(o.material);                    // canto = FR4 (no cambia de color)
  // líneas de borde -> hacen visibles tabs/slots/cutouts aún en modo sólido
  const e=new THREE.LineSegments(new THREE.EdgesGeometry(o.geometry,25),
    new THREE.LineBasicMaterial({color:0x1a1a1a}));
  o.add(e); caseEdges.push(e);
});

// checkboxes
const bind=(id,grp)=>{const el=document.getElementById(id);el.onchange=()=>grp.visible=el.checked;};
bind('c_pcb',G.pcb); bind('c_comps',G.comps); bind('c_knobs',G.knobs); bind('c_screws',G.screws); bind('c_panel',G.panel); bind('c_case',G.case);
// selector de TIPO de perilla (potes) + color individual por pote
const ktSel=document.getElementById('knobtype');
Object.keys(KNOB_TYPES).forEach(n=>{const op=document.createElement('option');op.value=KNOB_TYPES[n];op.textContent=n;ktSel.appendChild(op);});
ktSel.onchange=()=>setKnobType(ktSel.value);
setKnobType(ktSel.value);   // tipo inicial (WH148)
// color por pote desde paleta acotada (3 filas de swatches, marca el activo)
const pcDiv=document.getElementById('potecols');
[0,1,2].forEach(i=>{
  const row=document.createElement('div'); row.style.cssText='margin:2px 0;white-space:nowrap';
  const lbl=document.createElement('span'); lbl.textContent='P'+(i+1); lbl.style.cssText='font-size:11px;color:#9aa;margin-right:4px';
  row.appendChild(lbl);
  KNOBPAL.forEach(([n,hex])=>{
    const b=document.createElement('button');
    b.title=n; b.dataset.hex=hex;
    b.style.cssText=`width:15px;height:15px;margin:1px;padding:0;border:2px solid ${hex===potColors[i]?'#8fd':'#666'};border-radius:3px;background:${hex};cursor:pointer`;
    b.onclick=()=>{potColors[i]=hex; if(potInst[i])applyPotColor(potInst[i],hex);
      [...row.children].forEach(c=>{if(c.dataset)c.style.borderColor=(c.dataset.hex===hex?'#8fd':'#666');});};
    row.appendChild(b);
  });
  pcDiv.appendChild(row);
});
document.getElementById('c_trans').onchange=e=>{
  const t=e.target.checked;
  [...caseMats,...caseFr4Mats].forEach(m=>{m.transparent=t;m.opacity=t?0.4:1;m.depthWrite=!t;m.needsUpdate=true;});
};
document.getElementById('c_edges').onchange=e=>{caseEdges.forEach(l=>l.visible=e.target.checked);};
document.getElementById('cu_gold').onclick=()=>panelCuMats.forEach(m=>{m.color.copy(GOLD);m.needsUpdate=true;});
document.getElementById('cu_silver').onclick=()=>panelCuMats.forEach(m=>{m.color.copy(SILVER);m.needsUpdate=true;});

// botones de vista (cámara a posiciones preset, mirando el centro de la placa)
const R=230;  // distancia
const VIEWS={
  iso:   [CX-R*0.6, R*0.7, CZ-R*0.8],
  top:   [CX,       R*1.3, CZ+0.01],
  bottom:[CX,      -R*1.3, CZ+0.01],
  front: [CX,       R*0.25,CZ-R],      // borde de conectores (worldY min)
  back:  [CX,       R*0.25,CZ+R],
  left:  [CX-R,     R*0.25,CZ],
  right: [CX+R,     R*0.25,CZ],
};
document.querySelectorAll('#views button').forEach(b=>{
  b.onclick=()=>{const p=VIEWS[b.dataset.v];camera.position.set(p[0],p[1],p[2]);controls.target.set(CX,2,CZ);controls.update();};
});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
(function loop(){requestAnimationFrame(loop);controls.update();renderer.render(scene,camera);})();
</script>
</body>
</html>
